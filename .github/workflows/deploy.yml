name: Deploy Medinova Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'EOF'
            set -e

            mkdir -p /opt/medinova-agent
            cd /opt/medinova-agent

            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/PEDROMORRAESS/medinova-ia.git .
            fi

            docker build -t medinova-agent:latest .

            docker stack deploy -c docker-compose.yml medinova

            echo "✅ Deploy concluído!"
          EOF
