version: '3.8'

services:
  medinova_api:
    image: medinova-agent:latest
    networks:
      - traefik-public
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.medinova.rule=Host(`api.vbot.app.br`) && PathPrefix(`/medinova-ia`)"
        - "traefik.http.routers.medinova.entrypoints=websecure"
        - "traefik.http.routers.medinova.tls.certresolver=letsencrypt"
        - "traefik.http.services.medinova.loadbalancer.server.port=3001"
        - "traefik.http.middlewares.medinova-strip.stripprefix.prefixes=/medinova-ia"
        - "traefik.http.routers.medinova.middlewares=medinova-strip"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  medinova_worker:
    image: medinova-agent:latest
    networks:
      - traefik-public
    env_file:
      - .env
    environment:
      NODE_ENV: production
      WORKER_CONCURRENCY: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik-public:
    external: true
